<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>동마중 급식 & 일정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1D9E75;
      --green-light: #E1F5EE;
      --green-dark: #0F6E56;
      --red: #E24B4A;
      --red-light: #FCEBEB;
      --red-dark: #A32D2D;
      --blue: #3B82F6;
      --blue-light: #EFF6FF;
      --blue-dark: #1E40AF;
      --bg: #F4F6F3;
      --surface: #FFFFFF;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --border: rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px 18px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }

    .header .date-badge {
      margin-left: auto;
      font-size: 12px; color: var(--text-muted);
      background: var(--bg); padding: 4px 10px;
      border-radius: 99px; font-weight: 500;
    }

    .main { max-width: 560px; margin: 0 auto; padding: 24px 16px 0; }

    .section-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted); margin: 28px 0 12px;
    }
    .section-label:first-child { margin-top: 0; }

    /* 학사일정 카드 스타일 */
    .schedule-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .schedule-card.today-event {
      border-left: 4px solid var(--blue);
      background: linear-gradient(to right, var(--blue-light), var(--surface));
    }
    .schedule-date {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 45px;
    }
    .schedule-date .month { font-size: 10px; color: var(--text-muted); font-weight: 700; }
    .schedule-date .day { font-size: 18px; color: var(--text); font-weight: 700; line-height: 1.2; }
    
    .schedule-info { flex: 1; }
    .schedule-title { font-size: 14px; font-weight: 600; color: var(--text); }
    
    .schedule-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 4px;
    }
    .schedule-type { 
        font-size: 10px; 
        padding: 2px 6px;
        background: var(--bg);
        color: var(--text-muted);
        border-radius: 4px;
        font-weight: 700;
    }
    .d-day-badge {
        font-size: 11px;
        font-weight: 800;
        color: var(--blue);
        background: var(--blue-light);
        padding: 2px 8px;
        border-radius: 99px;
    }
    .today-event .d-day-badge {
        background: var(--blue);
        color: white;
    }

    /* 기존 급식 카드 스타일 유지 */
    .meal-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px; margin-bottom: 10px;
    }
    .meal-card.today { border: 2px solid var(--green); }

    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .card-date { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }

    .today-badge {
      font-size: 11px; font-weight: 700;
      background: var(--green-light); color: var(--green-dark);
      padding: 3px 9px; border-radius: 99px;
    }

    .menu-grid { display: flex; flex-wrap: wrap; gap: 6px; }

    .menu-chip {
      background: var(--bg); border-radius: var(--radius-sm);
      padding: 7px 13px; font-size: 13px; font-weight: 500;
    }

    .vote-section {
      margin-top: 18px; padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .vote-question { font-size: 13px; color: var(--text-muted); font-weight: 500; margin-bottom: 12px; }

    .vote-buttons { display: flex; gap: 8px; margin-bottom: 14px; }

    .vote-btn {
      flex: 1; padding: 12px 0;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg); font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .vote-btn .btn-label { font-size: 13px; font-weight: 700; color: var(--text-muted); }
    .vote-btn:not(:disabled):hover  { transform: scale(1.02); border-color: rgba(0,0,0,0.15); }
    .vote-btn:not(:disabled):active { transform: scale(0.97); }
    .vote-btn.active-like    { background: var(--green-light); border-color: var(--green); }
    .vote-btn.active-like    .btn-label { color: var(--green-dark); }
    .vote-btn.active-dislike { background: var(--red-light);   border-color: var(--red); }
    .vote-btn.active-dislike .btn-label { color: var(--red-dark); }
    .vote-btn:disabled { cursor: default; opacity: 0.5; }

    .vote-stats { background: var(--bg); border-radius: var(--radius-sm); padding: 14px; }
    .stats-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .stats-total { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .stats-total strong { color: var(--text); font-weight: 700; }

    .bar-wrap {
      height: 8px; background: rgba(0,0,0,0.08);
      border-radius: 99px; overflow: hidden; display: flex; margin-bottom: 8px;
    }
    .bar-like    { background: var(--green); height: 100%; border-radius: 99px 0 0 99px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
    .bar-dislike { background: var(--red);   height: 100%; border-radius: 0 99px 99px 0; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

    .stats-nums { display: flex; justify-content: space-between; }
    .like-stat    { font-size: 12px; color: var(--green-dark); font-weight: 700; }
    .dislike-stat { font-size: 12px; color: var(--red-dark);   font-weight: 700; text-align: right; }

    .empty-msg { text-align: center; padding: 48px 24px; color: var(--text-muted); }
    .empty-msg .icon { font-size: 32px; display: block; margin-bottom: 8px; }
    .empty-msg p { font-size: 14px; font-weight: 500; }

    .skeleton {
      background: linear-gradient(90deg,#e8e8e8 25%,#f5f5f5 50%,#e8e8e8 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
      border-radius: 8px; height: 14px; margin-bottom: 8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton-card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 20px; margin-bottom: 10px;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo-dot"></div>
    <h1>동마중학교 급식 & 일정</h1>
    <span class="date-badge" id="todayLabel"></span>
  </div>
</header>

<main class="main">
  <!-- 급식 섹션 -->
  <div id="meal-container">
    <p class="section-label">📍 급식 정보</p>
    <div class="skeleton-card">
      <div class="skeleton" style="width:40%;margin-bottom:16px;"></div>
      <div class="skeleton" style="width:85%;"></div>
      <div class="skeleton" style="width:70%;"></div>
    </div>
  </div>

  <!-- 학사일정 섹션 -->
  <div id="schedule-container" style="margin-top: 32px;">
    <p class="section-label">📅 주요 학사일정</p>
    <div class="skeleton-card">
      <div class="skeleton" style="width:30%;margin-bottom:12px;"></div>
      <div class="skeleton" style="width:60%;"></div>
    </div>
  </div>
</main>

<div style="position:fixed;bottom:16px;right:20px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;color:rgba(0,0,0,0.35);letter-spacing:-0.01em;pointer-events:none;user-select:none;">
  Made By 이서준
</div>

<script>
  /* ── 기본 정보 및 날짜 설정 ── */
  const ATPT_CODE = "B10"; // 서울특별시교육청
  const SCHUL_CODE = "7134129"; // 동마중학교

  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  const todayStr = `${yyyy}${mm}${dd}`;
  const dayIndex = today.getDay();

  document.getElementById('todayLabel').textContent =
    `${today.getMonth()+1}월 ${today.getDate()}일 (${['일','월','화','수','목','금','토'][dayIndex]})`;

  const mealContainer = document.getElementById('meal-container');
  const scheduleContainer = document.getElementById('schedule-container');

  /* ── 투표 관련 로직 (생략/유지) ── */
  function getVoterId() {
    let id = localStorage.getItem('dmj_voter_id');
    if (!id) {
      id = 'v_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('dmj_voter_id', id);
    }
    return id;
  }
  const VOTER_ID = getVoterId();

  async function fetchVotes(date) {
    try {
      const res = await fetch(`/api/votes/${date}`);
      return res.ok ? res.json() : { likes: 0, dislikes: 0 };
    } catch(e) { return { likes: 0, dislikes: 0 }; }
  }

  async function fetchMyVote(date) {
    try {
      const res = await fetch(`/api/votes/${date}/my?voter_id=${encodeURIComponent(VOTER_ID)}`);
      if (!res.ok) return null;
      const data = await res.json();
      return data.vote;
    } catch(e) { return null; }
  }

  async function postVote(date, type) {
    const res = await fetch(`/api/votes/${date}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ voter_id: VOTER_ID, type })
    });
    return res.json();
  }

  function renderStats(el, v) {
    const total = v.likes + v.dislikes;
    const lp = total === 0 ? 0 : Math.round(v.likes / total * 100);
    const dp = total === 0 ? 0 : 100 - lp;
    el.innerHTML = `
      <div class="stats-top">
        <span class="stats-total"><strong>${total}명</strong>이 평가했어요</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-like" style="width:${lp}%"></div>
        <div class="bar-dislike" style="width:${dp}%"></div>
      </div>
      <div class="stats-nums">
        <span class="like-stat">👍 맛있다 ${lp}% (${v.likes})</span>
        <span class="dislike-stat">(${v.dislikes}) ${dp}% 별로다 👎</span>
      </div>
    `;
  }

  /* ── 급식 카드 생성 ── */
  async function buildMealCard(item) {
    const date = item.MLSV_YMD;
    const isToday = date === todayStr;
    const fDate = `${date.slice(4,6)}월 ${date.slice(6,8)}일`;

    const menus = item.DDISH_NM.split('<br/>').map(m =>
      m.replace(/\([^)]*\)/g,'').replace(/[+★♡.]/g,'').trim()
    ).filter(Boolean);

    const card = document.createElement('div');
    card.className = 'meal-card' + (isToday ? ' today' : '');
    card.innerHTML = `
      <div class="card-header">
        <span class="card-date">${fDate}</span>
        ${isToday ? '<span class="today-badge">오늘</span>' : ''}
      </div>
      <div class="menu-grid">
        ${menus.map(m => `<span class="menu-chip">${m}</span>`).join('')}
      </div>
      ${isToday ? `
        <div class="vote-section">
          <p class="vote-question">오늘 급식은 어땠나요?</p>
          <div class="vote-buttons">
            <button class="vote-btn" id="like-btn">👍 <span class="btn-label">맛있다</span></button>
            <button class="vote-btn" id="dislike-btn">👎 <span class="btn-label">별로다</span></button>
          </div>
          <div class="vote-stats" id="vote-stats"><p style="font-size:12px;color:var(--text-muted);">통계 불러오는 중...</p></div>
        </div>
      ` : ''}
    `;

    if (isToday) {
      const statsEl = card.querySelector('#vote-stats');
      const likeBtn = card.querySelector('#like-btn');
      const dislikeBtn = card.querySelector('#dislike-btn');

      const [votes, myVote] = await Promise.all([fetchVotes(date), fetchMyVote(date)]);
      renderStats(statsEl, votes);

      if (myVote) {
        if (myVote === 'like') likeBtn.classList.add('active-like');
        else dislikeBtn.classList.add('active-dislike');
        likeBtn.disabled = dislikeBtn.disabled = true;
      } else {
        const handleVote = async (type) => {
          likeBtn.disabled = dislikeBtn.disabled = true;
          const res = await postVote(date, type);
          if (type === 'like') likeBtn.classList.add('active-like');
          else dislikeBtn.classList.add('active-dislike');
          renderStats(statsEl, res);
        };
        likeBtn.onclick = () => handleVote('like');
        dislikeBtn.onclick = () => handleVote('dislike');
      }
    }
    return card;
  }

  function loadMeals() {
    if (dayIndex === 0 || dayIndex === 6) {
      mealContainer.innerHTML = `<p class="section-label">📍 급식 정보</p><div class="empty-msg"><span class="icon">🍙</span><p>오늘은 주말이라 급식이 없어요.</p></div>`;
      return;
    }
    const fri = new Date(today);
    fri.setDate(today.getDate() + (5 - dayIndex));
    const endStr = `${fri.getFullYear()}${String(fri.getMonth()+1).padStart(2,'0')}${String(fri.getDate()).padStart(2,'0')}`;
    const url = `https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${ATPT_CODE}&SD_SCHUL_CODE=${SCHUL_CODE}&MLSV_FROM_YMD=${todayStr}&MLSV_TO_YMD=${endStr}`;

    fetch(url).then(r => r.json()).then(async data => {
      if (!data.mealServiceDietInfo) throw new Error();
      const rows = data.mealServiceDietInfo[1].row;
      mealContainer.innerHTML = '';
      for (let i = 0; i < rows.length; i++) {
        const section = document.createElement('p');
        section.className = 'section-label';
        section.textContent = i === 0 ? '📍 현재 급식' : (i === 1 ? '📅 이번 주 급식' : '');
        if (section.textContent) mealContainer.appendChild(section);
        const card = await buildMealCard(rows[i]);
        mealContainer.appendChild(card);
      }
    }).catch(() => {
      mealContainer.innerHTML = `<p class="section-label">📍 급식 정보</p><div class="empty-msg"><span class="icon">⚠️</span><p>급식 정보를 불러올 수 없습니다.</p></div>`;
    });
  }

  /* ── D-Day 계산 함수 ── */
  function getDDay(targetYmd) {
    const tYear = parseInt(targetYmd.slice(0, 4));
    const tMonth = parseInt(targetYmd.slice(4, 6)) - 1;
    const tDay = parseInt(targetYmd.slice(6, 8));
    
    const targetDate = new Date(tYear, tMonth, tDay);
    const nowDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    
    const diff = targetDate.getTime() - nowDate.getTime();
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    
    if (days === 0) return "D-Day";
    if (days > 0) return `D-${days}`;
    return `D+${Math.abs(days)}`;
  }

  /* ── 학사일정 데이터 가져오기 ── */
  function loadSchedule() {
    const lastDay = new Date(yyyy, today.getMonth() + 1, 0).getDate();
    const endOfMonth = `${yyyy}${mm}${lastDay}`;

    const url = `https://open.neis.go.kr/hub/SchoolSchedule?Type=json&ATPT_OFCDC_SC_CODE=${ATPT_CODE}&SD_SCHUL_CODE=${SCHUL_CODE}&AA_FROM_YMD=${todayStr}&AA_TO_YMD=${endOfMonth}`;

    fetch(url).then(r => r.json()).then(data => {
      scheduleContainer.innerHTML = '<p class="section-label">📅 주요 학사일정</p>';
      
      if (!data.SchoolSchedule) {
        scheduleContainer.innerHTML += `<div class="empty-msg"><p>남은 달 동안 예정된 일정이 없습니다.</p></div>`;
        return;
      }

      const rows = data.SchoolSchedule[1].row.filter(row => row.EVENT_NM !== "토요휴업일");

      if (rows.length === 0) {
        scheduleContainer.innerHTML += `<div class="empty-msg"><p>남은 달 동안 예정된 일정이 없습니다.</p></div>`;
        return;
      }

      rows.forEach(item => {
        const date = item.AA_YMD;
        const isTodayEvent = date === todayStr;
        const m = date.slice(4,6);
        const d = date.slice(6,8);
        const dDay = getDDay(date);
        
        const div = document.createElement('div');
        div.className = `schedule-card ${isTodayEvent ? 'today-event' : ''}`;
        div.innerHTML = `
          <div class="schedule-date">
            <span class="month">${parseInt(m)}월</span>
            <span class="day">${parseInt(d)}</span>
          </div>
          <div class="schedule-info">
            <div class="schedule-title">${item.EVENT_NM}</div>
            <div class="schedule-meta">
                <span class="d-day-badge">${dDay}</span>
                <span class="schedule-type">${item.SBTR_DD_SC_NM === '해당없음' ? '일반' : item.SBTR_DD_SC_NM}</span>
            </div>
          </div>
        `;
        scheduleContainer.appendChild(div);
      });
    }).catch(() => {
      scheduleContainer.innerHTML = `<p class="section-label">📅 주요 학사일정</p><div class="empty-msg"><p>일정을 불러오지 못했습니다.</p></div>`;
    });
  }

  loadMeals();
  loadSchedule();
</script>
</body>
</html>
